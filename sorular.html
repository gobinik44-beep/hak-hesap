<script src="sorular.js"></script>
<script>
(function () {
  var adlar = { "kıdem": "Kıdem Tazminatı", "ihbar": "İhbar Süresi", "deneme": "Deneme Süresi",
                "maaş": "Maaş ve Ücret", "fazla-mesai": "Fazla Mesai", "izin": "Yıllık İzin",
                "kira": "Kira ve Konut", "tüketici": "Tüketici Hakları" };
  var gruplar = {};
  SORULAR.forEach(function (s) { (gruplar[s.kategori] = gruplar[s.kategori] || []).push(s); });
  var kok = document.getElementById("liste");
  Object.keys(gruplar).forEach(function (k) {
    var kart = document.createElement("div");
    kart.className = "kart";
    var h = "<h2>" + (adlar[k] || k) + "</h2>";
    gruplar[k].forEach(function (s) {
      h += "<h3>" + s.soru + "</h3><p>" + s.cevap_soz +
           " <span class='veri-notu'>(Dayanak: " + s.dayanak + ")</span></p>";
    });
    kart.innerHTML = h;
    kok.appendChild(kart);
  });
})();
</script>
