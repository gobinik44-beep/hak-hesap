<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Videolar — Güncel Oranlar ve Haklar | Hak &amp; Hesap</title>
<meta name="description" content="Kira artışı, kıdem tazminatı ve çalışan haklarıyla ilgili güncel, kaynaklı videolar.">
<link rel="canonical" href="https://hakvehesap.example/videolar.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Videolar | Hak &amp; Hesap">
<meta property="og:url" content="https://hakvehesap.example/videolar.html">
<meta property="og:locale" content="tr_TR">
<link rel="stylesheet" href="stil.css">
<style>
.video-cerceve { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; border: 1px solid var(--cizgi); }
.video-cerceve iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
</style>
</head>
<body>
<div class="sarici">
  <header class="site"><a href="index.html">← Hak &amp; Hesap</a></header>
  <h1>Videolar</h1>
  <p class="altbaslik">Her ay güncel oranlar, örnek hesaplar ve haklarınız — sitedeki doğrulanmış
  verilerle üretilir.</p>

  <div class="kart" id="videoKart"></div>

  <footer class="site">Bu içerikler bilgilendirme amaçlıdır; hukuki/mali danışmanlık değildir.</footer>
</div>

<script src="veri.js"></script>
<script>
(function () {
  var k = document.getElementById("videoKart");
  var id = VERI.youtubeKanalId;
  if (id && id.indexOf("UC") === 0) {
    // UC -> UU: kanalın "yüklemeler" oynatma listesi; en yeni videolar otomatik görünür.
    var liste = "UU" + id.slice(2);
    k.innerHTML = '<div class="video-cerceve"><iframe loading="lazy" ' +
      'src="https://www.youtube.com/embed/videoseries?list=' + liste + '" ' +
      'title="Hak & Hesap videoları" allowfullscreen ' +
      'allow="accelerometer; encrypted-media; picture-in-picture"></iframe></div>' +
      '<p class="veri-notu">Liste, kanala yüklenen son videolarla otomatik güncellenir.</p>';
  } else {
    k.innerHTML = '<p>Video kanalı yakında yayında. Kanal açıldığında bu sayfa son videoları ' +
      'otomatik gösterecek.</p>' +
      '<p class="veri-notu">(Kurulum: veri.js içindeki youtubeKanalId alanına UC... ile başlayan ' +
      'kanal kimliğini yazmak yeterli.)</p>';
  }
})();
</script>
</body>
</html>
